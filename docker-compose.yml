services:
  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5450:5432"
    environment:
      POSTGRES_DB: formulariolegajo
      POSTGRES_USER: formulariolegajo
      POSTGRES_PASSWORD: formulariolegajo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formulariolegajo -d formulariolegajo"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: FormularioLegajo
      APP_ENV: production
      APP_KEY: base64:sf5iW26P1EM7WSA5Ia5nWHjl6qBvBwcVbvbvHqRAGfg=
      APP_DEBUG: "false"
      APP_URL: http://localhost:8082
      LOG_CHANNEL: stack
      LOG_STACK: stderr
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: formulariolegajo
      DB_USERNAME: formulariolegajo
      DB_PASSWORD: formulariolegajo
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      JWT_SECRET: 4zIzzY4Z0do4VfJjO6cQ5zYk0hAwm5PR8gI8MZ0u3lV6sX2r
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend-builder:
    image: node:20-alpine
    profiles: ["build"]
    working_dir: /app
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - ./frontend-formdatos:/app
      - frontend_node_modules:/app/node_modules
    command: sh -lc "npm ci && npm run build"

  web:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8082:80"

volumes:
  postgres_data:
  frontend_node_modules:
